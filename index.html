<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .calculator {
    width: 300px;
    margin: 50px auto;
    background: #333;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}
#display {
    width: 100%;
    height: 50px;
    font-size: 24px;
    text-align: right;
    margin-bottom: 10px;
    padding: 10px;
    box-sizing: border-box;
}
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}
button {
    padding: 20px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
}
button:hover { background: #ddd; }
.col-2 { grid-column: span 2; background: #ff9500; color: white; }

    </style>
</head>
<body>
    <div class="calculator">
    <input type="text" id="display" readonly>
    <div class="buttons" id="btn-container">
        <button id="clear" class="col-2">C</button>
        <button id="delete">DEL</button>
        <button class="operator" data-value="/">/</button>
        
        <button class="number" data-value="7">7</button>
        <button class="number" data-value="8">8</button>
        <button class="number" data-value="9">9</button>
        <button class="operator" data-value="*">*</button>
        
        <button class="number" data-value="4">4</button>
        <button class="number" data-value="5">5</button>
        <button class="number" data-value="6">6</button>
        <button class="operator" data-value="-">-</button>
        
        <button class="number" data-value="1">1</button>
        <button class="number" data-value="2">2</button>
        <button class="number" data-value="3">3</button>
        <button class="operator" data-value="+">+</button>
        
        <button class="number" data-value="0">0</button>
        <button class="number" data-value=".">.</button>
        <button id="equal" class="col-2">=</button>
    </div>
</div>


    <script>
        const display = document.getElementById('display');
const container = document.getElementById('btn-container');

container.addEventListener('click', (e) => {
    if (!e.target.matches('button')) return;

    const btn = e.target;
    const value = btn.getAttribute('data-value');
    const id = btn.id;

    if (id === 'clear') {
        display.value = '';
    } 
    else if (id === 'delete') {
        display.value = display.value.slice(0, -1);
    } 
    else if (id === 'equal') {
        try {
            
            display.value = eval(display.value) || "";
        } catch {
            display.value = "Error";
        }
    } 
    else {
        
        display.value += value;
    }
});

    </script>
</body>
</html>
